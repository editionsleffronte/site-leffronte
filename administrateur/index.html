<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Éditions L'Effronté</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main'
        },
        media_folder: 'images',
        public_folder: '/images',
        locale: 'fr',
        collections: [{
          name: 'livres',
          label: 'Livres',
          folder: 'content/livres',
          create: true,
          fields: [
            {label: 'Titre', name: 'title', widget: 'string'},
            {label: 'Sous-titre', name: 'subtitle', widget: 'string'},
            {label: 'Auteur', name: 'author', widget: 'string', default: 'Frederick Candon'},
            {label: 'Prix', name: 'price', widget: 'string'},
            {label: 'Couverture', name: 'cover', widget: 'image'}
          ]
        }]
      }
    });
  </script>
</body>
</html>
